<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FocusLock Dashboard</title>
</head>
<body>
  <div id="loading">Loading…</div>
  <div id="app" style="display:none">

    <div class="header">
      <div class="header-top">
        <span class="header-title">Activity</span>
        <span class="header-date" id="date-label"></span>
      </div>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-label">Commits today</span>
          <span class="stat-val green" id="commits-today">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Distracted</span>
          <span class="stat-val red" id="distr-today">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Unlocks</span>
          <span class="stat-val neutral" id="distr-count">—</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Today — hour by hour</div>
      <div class="heatmap no-drag" id="today-heatmap"></div>
    </div>

    <div class="section">
      <div class="section-title">Last 7 days</div>
      <div class="grid7 no-drag" id="week-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">Today's work</div>
      <div class="project-list no-drag" id="today-projects"></div>
    </div>

    <div class="section">
      <div class="section-title">This week</div>
      <div class="project-list no-drag" id="week-projects"></div>
    </div>

    <div class="section">
      <div class="section-title">Your patterns</div>
      <div class="insights no-drag" id="insights"></div>
    </div>

  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
