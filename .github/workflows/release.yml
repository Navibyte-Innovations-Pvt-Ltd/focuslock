name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="focuslock-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" focuslock install.sh uninstall.sh CLAUDE.md README.md LICENSE CHANGELOG.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "focuslock ${{ env.VERSION }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.NOTES }}

            ---

            ## Install

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/focuslock-${{ env.VERSION }}.tar.gz | tar -xz
            sudo bash install.sh
            ```

            ## Usage
            ```bash
            sudo focuslock allow    # pick sites + duration, auto-reblocks
            sudo focuslock block    # manual reblock
            focuslock list          # see all sites + state
            focuslock help          # all commands
            ```
          files: ${{ env.ARCHIVE }}
          draft: false
          prerelease: false
