name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Bump patch version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SEMVER=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "Auto version: $VERSION (previous: $LATEST)"

      - name: Generate changelog from commits
        id: changelog
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            ENTRIES=$(git log --pretty=format:"- %s" | grep -v '^- Merge ')
          else
            ENTRIES=$(git log "${LATEST}..HEAD" --pretty=format:"- %s" | grep -v '^- Merge ')
          fi

          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            msg="${line#- }"
            case "$msg" in
              feat*|Feat*) ADDED="${ADDED}\n${line}" ;;
              fix*|Fix*)   FIXED="${FIXED}\n${line}" ;;
              *)           CHANGED="${CHANGED}\n${line}" ;;
            esac
          done <<< "$ENTRIES"

          NOTES=""
          if [ -n "$ADDED" ]; then
            NOTES="${NOTES}### Added\n$(printf '%b' "$ADDED")\n\n"
          fi
          if [ -n "$FIXED" ]; then
            NOTES="${NOTES}### Fixed\n$(printf '%b' "$FIXED")\n\n"
          fi
          if [ -n "$CHANGED" ]; then
            NOTES="${NOTES}### Changed\n$(printf '%b' "$CHANGED")\n\n"
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Maintenance release."
          fi

          printf 'NOTES<<EOF\n%b\nEOF\n' "$NOTES" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE="focuslock-${VERSION}.tar.gz"
          tar -czf "$ARCHIVE" focuslock install.sh uninstall.sh CLAUDE.md README.md LICENSE CHANGELOG.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "focuslock ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.NOTES }}

            ---

            ## Install

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/focuslock-${{ steps.version.outputs.VERSION }}.tar.gz | tar -xz
            sudo bash install.sh
            ```

            ## Usage
            ```bash
            sudo focuslock allow    # pick sites + duration, auto-reblocks
            sudo focuslock block    # manual reblock
            focuslock list          # see all sites + state
            focuslock help          # all commands
            ```
          files: ${{ env.ARCHIVE }}

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@navibyte-innovations-pvt-ltd'

      - name: Publish to GitHub Packages (npm)
        run: |
          SEMVER="${{ steps.version.outputs.SEMVER }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${SEMVER}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
