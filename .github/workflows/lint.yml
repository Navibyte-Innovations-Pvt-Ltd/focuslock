name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint focuslock
        run: shellcheck -s bash focuslock install.sh uninstall.sh
